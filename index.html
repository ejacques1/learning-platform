<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Learning Platform</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      text-align: center;
      padding: 1.5rem;
    }
    .welcome {
      max-width: 640px;
    }
    h1 {
      font-size: clamp(1.75rem, 5vw, 3rem);
      font-weight: 700;
      line-height: 1.2;
    }
    p {
      margin-top: 1rem;
      font-size: 1.1rem;
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <main class="welcome">
    <h1>Welcome to my Learning Platform — more coming soon!</h1>
    <p>Stay tuned.</p>
  </main>
</body>
</html>
